<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iam2cool's Repo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }
        p {
            color: #aaaaaa;
            margin-bottom: 1.5rem;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .btn {
            background-color: #007aff;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.2s;
            display: block;
            text-align: center;
            box-sizing: border-box;
        }
        .btn:hover {
            background-color: #005bb5;
        }
        .btn.zebra {
            background-color: #34c759;
        }
        .btn.zebra:hover {
            background-color: #289e45;
        }
        .btn.cydia {
            background-color: #ff9500;
        }
        .btn.cydia:hover {
            background-color: #d67c00;
        }
    </style>
    <script>
        function openRepo(event, manager) {
            event.preventDefault();
            let urls = {};
            
            if (manager === 'sileo') {
                urls.native = "sileo://source/https://iam2c00l.github.io/iam2cool/";
                urls.fallback = "https://repo.packix.com/api/add/https://iam2c00l.github.io/iam2cool/"; // or guide them to copy
            } else if (manager === 'zebra') {
                urls.native = "zbra://sources/add/https://iam2c00l.github.io/iam2cool/";
            } else if (manager === 'cydia') {
                urls.native = "cydia://url/https://cydia.saurik.com/api/share#?url=https://iam2c00l.github.io/iam2cool/";
            }

            // Try to open the native app scheme
            window.location.href = urls.native;

            // If the app isn't installed, iOS will fail to open the scheme. 
            // We can catch it or let Safari show its standard notification, 
            // but preventing a hard crash loop is handled by direct scheme targeting.
        }
    </script>
</head>
<body>

    <div class="container">
        <h1>Add to Package Manager</h1>
        <p>Tap a button below to add this repository directly to your favorite package manager.</p>
        
        <div class="button-group">
            <a href="sileo://source/https://iam2c00l.github.io/iam2cool/" onclick="openRepo(event, 'sileo')" class="btn">Add to Sileo</a>
            <a href="zbra://sources/add/https://iam2c00l.github.io/iam2cool/" onclick="openRepo(event, 'zebra')" class="btn zebra">Add to Zebra</a>
            <a href="cydia://url/https://cydia.saurik.com/api/share#?url=https://iam2c00l.github.io/iam2cool/" onclick="openRepo(event, 'cydia')" class="btn cydia">Add to Cydia</a>
        </div>
    </div>

</body>
</html>
